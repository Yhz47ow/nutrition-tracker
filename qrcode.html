<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>扫码打开营养追踪</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;
  background:#f5f7fa;display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:100vh;padding:20px;text-align:center;
}
.card{
  background:#fff;border-radius:24px;padding:30px;box-shadow:0 4px 24px rgba(0,0,0,.1);
  max-width:400px;width:100%;
}
h1{font-size:24px;color:#1a1a2e;margin-bottom:4px}
.sub{color:#666;font-size:13px;margin-bottom:20px}
.qr-wrap{
  background:#fff;border-radius:16px;padding:16px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:16px;
}
.qr-wrap img{width:100%;max-width:280px;height:auto;display:block;margin:0 auto}
.url-box{
  background:#f5f7fa;border-radius:12px;padding:10px 14px;
  font-size:12px;color:#333;word-break:break-all;margin-bottom:16px;
}
.btn{
  display:inline-block;background:#4CAF50;color:#fff;border:none;border-radius:12px;
  padding:12px 28px;font-size:16px;font-weight:600;text-decoration:none;cursor:pointer;
}
.btn:active{background:#388E3C}
.steps{margin-top:16px;text-align:left;font-size:13px;color:#666;line-height:1.8}
.steps strong{color:#333}
</style>
</head>
<body>
<div class="card">
  <h1>🥗 营养追踪</h1>
  <p class="sub">碳蛋脂记录仪 · 扫码打开</p>
  <div class="qr-wrap">
    <img src="qrcode.png" alt="QR Code">
  </div>
  <div class="url-box">https://yhz47ow.github.io/nutrition-tracker/</div>
  <div>
    <a class="btn" href="https://yhz47ow.github.io/nutrition-tracker/" target="_blank">直接打开 →</a>
  </div>
  <div class="steps">
    <strong>📱 添加到主屏幕：</strong><br>
    1. Safari 打开后点底部「分享」<br>
    2. 滑到「添加到主屏幕」<br>
    3. 右上角「添加」→ 以后桌面直接用<br><br>
    <strong>☁️ 云同步设置：</strong><br>
    1. 打开「记录」页 → 「🔑 配置 Token」<br>
    2. 粘贴 GitHub Token（需 gist 权限）<br>
    3. 点「☁️ 上传到云端」备份数据
  </div>
</div>
</body>
</html>
